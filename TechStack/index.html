<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStack | Modern Code Hosting</title>
    <style>
        :root { --bg: #0d1117; --border: #30363d; --text: #c9d1d9; --green: #238636; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .upload-section { background: #161b22; border: 1px solid var(--border); padding: 20px; border-radius: 6px; margin: 20px 0; }
        input, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 4px; box-sizing: border-box; margin-bottom: 10px; }
        button { background: var(--green); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
        th { background: #161b22; text-align: left; padding: 12px; }
        td { padding: 12px; border-top: 1px solid var(--border); font-family: monospace; }
        .file-icon { margin-right: 8px; color: #8b949e; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>TechStack <span style="font-weight: 200; color: #8b949e;">/ main</span></h1>
            <div id="stats">0 Dosya</div>
        </header>

        <div class="upload-section">
            <input type="text" id="fileName" placeholder="Dosya adı (örn: app.js)">
            <textarea id="fileContent" rows="5" placeholder="Kod içeriğini buraya yazın..."></textarea>
            <button onclick="pushCode()">Commit & Push</button>
        </div>

        <table>
            <thead>
                <tr><th>Dosya Adı</th><th>Boyut</th></tr>
            </thead>
            <tbody id="fileList">
                </tbody>
        </table>
    </div>

    <script>
        const REPO_NAME = "TechStack-Main";

        async function fetchRepo() {
            const res = await fetch(`/.netlify/functions/list?repo=${REPO_NAME}`);
            const data = await res.json();
            const list = document.getElementById('fileList');
            document.getElementById('stats').innerText = `${data.files.length} Dosya`;
            
            list.innerHTML = data.files.map(file => `
                <tr>
                    <td><span class="file-icon">📄</span> ${file.key.split('/')[1]}</td>
                    <td>${(file.size / 1024).toFixed(2)} KB</td>
                </tr>
            `).join('');
        }

        async function pushCode() {
            const fileName = document.getElementById('fileName').value;
            const content = document.getElementById('fileContent').value;
            if(!fileName || !content) return alert("Alanları doldur!");

            const res = await fetch('/.netlify/functions/upload', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ repoName: REPO_NAME, fileName, content })
            });

            if(res.ok) {
                alert("Başarıyla Push Edildi!");
                document.getElementById('fileName').value = "";
                document.getElementById('fileContent').value = "";
                fetchRepo();
            }
        }

        fetchRepo();
    </script>
</body>
</html>
